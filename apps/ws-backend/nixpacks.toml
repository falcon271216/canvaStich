# Service root on Railway: apps/ws-backend

[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.install]
dependsOn = ["setup"]
# Use subshell so WORKDIR stays apps/ws-backend (cd ../.. would break `node dist/server.js`)
cmds = ["sh -c 'cd ../.. && corepack enable && pnpm install --frozen-lockfile'"]

[phases.build]
dependsOn = ["install"]
cmds = [
  "sh -c 'cd ../.. && pnpm turbo build --filter=ws-backend...'",
  "test -f dist/server.js || (echo 'missing dist/server.js' && ls -la dist 2>/dev/null || ls -la && exit 1)"
]

[start]
cmd = "node start.cjs"
