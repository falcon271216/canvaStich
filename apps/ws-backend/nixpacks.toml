# Service root on Railway: apps/ws-backend
# Stops Nixpacks from running the monorepo root `pnpm build` (which compiles Next.js apps).

[variables]
NIXPACKS_NODE_VERSION = "20"

[phases.install]
dependsOn = ["setup"]
cmds = ["cd ../.. && corepack enable && pnpm install --frozen-lockfile"]

[phases.build]
dependsOn = ["install"]
cmds = ["cd ../.. && pnpm turbo build --filter=ws-backend..."]

[start]
cmd = "node dist/index.js"
