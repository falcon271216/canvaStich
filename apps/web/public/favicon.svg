<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="10" y1="4" x2="54" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8"/>
      <stop offset="0.42" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="0%" r="75%">
      <stop stop-color="#fff" stop-opacity=".34"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect width="64" height="64" rx="16" fill="url(#glow)"/>

  <!-- Selection frame (UI card) -->
  <rect x="16" y="17" width="32" height="28" rx="5" fill="#fff" fill-opacity=".12" stroke="#fff" stroke-width="4"/>
  <rect x="21.5" y="23.5" width="21" height="3.6" rx="1.8" fill="#fff"/>
  <rect x="21.5" y="31" width="14.5" height="3.1" rx="1.55" fill="#fff" fill-opacity=".55"/>

  <!-- Corner handles -->
  <rect x="12" y="13" width="7" height="7" rx="1.6" fill="#fff"/>
  <rect x="45" y="13" width="7" height="7" rx="1.6" fill="#fff"/>
  <rect x="12" y="44" width="7" height="7" rx="1.6" fill="#fff"/>
  <rect x="45" y="44" width="7" height="7" rx="1.6" fill="#C4B5FD"/>
</svg>
